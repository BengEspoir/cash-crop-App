<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-label="AgriculNet logo">
  <defs>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E7D32"/>
      <stop offset="1" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD766"/>
      <stop offset="1" stop-color="#F4B400"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#123b16" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="#FFFFFF"/>

  <!-- Icon mark -->
  <g transform="translate(110 80)" filter="url(#softShadow)">
    <circle cx="180" cy="180" r="160" fill="#F7FBF5" stroke="#E4EFE2" stroke-width="8"/>

    <!-- Shopping basket / e-commerce base -->
    <path d="M76 210 H284 L263 296 Q259 314 239 314 H121 Q101 314 97 296 Z" fill="#FFFFFF" stroke="#1B5E20" stroke-width="14" stroke-linejoin="round"/>
    <path d="M124 208 C132 158 165 132 180 132 C195 132 228 158 236 208" fill="none" stroke="#1B5E20" stroke-width="14" stroke-linecap="round"/>

    <!-- Leaf crop symbol -->
    <path d="M184 80 C272 82 316 143 308 217 C230 214 179 174 184 80 Z" fill="url(#leafGrad)"/>
    <path d="M184 80 C186 146 223 183 308 217" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <path d="M176 118 C109 128 73 177 80 238 C143 238 185 197 176 118 Z" fill="url(#goldGrad)"/>
    <path d="M176 118 C163 168 130 205 80 238" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>

    <!-- Network nodes -->
    <g fill="#F4B400" stroke="#FFFFFF" stroke-width="6">
      <circle cx="251" cy="110" r="15"/>
      <circle cx="310" cy="170" r="14"/>
      <circle cx="238" cy="245" r="13"/>
    </g>
    <g stroke="#F4B400" stroke-width="7" stroke-linecap="round" opacity="0.95">
      <path d="M251 110 L310 170"/>
      <path d="M310 170 L238 245"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(490 166)">
    <text x="0" y="105" font-family="Montserrat, Poppins, Arial, sans-serif" font-size="118" font-weight="800" letter-spacing="-3">
      <tspan fill="#2E7D32">Agricul</tspan><tspan fill="#F4B400">Net</tspan>
    </text>
    <text x="6" y="168" font-family="Montserrat, Poppins, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="6" fill="#1B5E20" opacity="0.84">AGRICULTURAL E-COMMERCE</text>
  </g>
</svg>
